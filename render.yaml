services:
  - type: web
    name: employee-management-api
    runtime: docker
    plan: free
    rootDir: fullbackend
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AES_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JPA_DDL_AUTO
        value: update
      - key: JPA_SHOW_SQL
        value: false
