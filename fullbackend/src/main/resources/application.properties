spring.application.name=employee-management

spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:h2:mem:empdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-minimum-32-chars}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

aes.key=${AES_KEY:0123456789abcdef0123456789abcdef}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.port=${PORT:${SERVER_PORT:8080}}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
