spring.application.name=employee-management

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/empdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=your-256-bit-secret-key-change-this-in-production-minimum-32-chars
jwt.expiration=86400000

# AES-256 (must be exactly 32 chars)
aes.key=0123456789abcdef0123456789abcdef

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Server
server.port=8080
